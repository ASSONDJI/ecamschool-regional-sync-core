version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: ecamschool-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: ecamschool_regional_db
      MYSQL_USER: ecamschool_user
      MYSQL_PASSWORD: ecamschool_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

volumes:
  mysql-data:
